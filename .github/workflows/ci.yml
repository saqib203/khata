name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore src/backend/PumpErp.Api/PumpErp.Api.csproj
      - name: Build
        run: dotnet build src/backend/PumpErp.Api/PumpErp.Api.csproj --configuration Release --no-restore
      - name: Test
        run: dotnet test tests/backend/PumpErp.Domain.Tests/PumpErp.Domain.Tests.csproj --configuration Release

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
